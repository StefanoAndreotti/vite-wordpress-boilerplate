name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  php-lint:
    name: PHP Lint (WPCS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install Composer dev dependencies
        run: composer install --dev --no-interaction --prefer-dist

      - name: Run PHPCS
        run: vendor/bin/phpcs

  js-lint:
    name: JS & CSS Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Lint JS
        run: bun run lint:js

      - name: Lint CSS
        run: bun run lint:css

  build:
    name: Vite Build
    runs-on: ubuntu-latest
    needs: [php-lint, js-lint]
    env:
      THEME_NAME: default-theme
      LOCAL_DOMAIN: localhost
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build assets
        run: bun run build

      - name: Check manifest exists
        run: test -f wp-content/themes/default-theme/assets/dist/.vite/manifest.json
